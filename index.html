<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>獨自升級 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">

  <nav class="sidebar">
    <div class="sidebar-top">
      <div class="workspace-row">
        <div class="ws-icon">升</div>
        <span class="ws-name">獨自升級 2026</span>
      </div>
      <div class="nav-section-label">Overview</div>
      <a class="nav-item active" onclick="go('home')" href="#">
        <span class="nav-icon">🏠</span> 首頁
      </a>
      <div class="nav-section-label">Daily</div>
      <a class="nav-item" onclick="go('daily')" href="#">
        <span class="nav-icon">✅</span> 每日任務
        <span class="nav-count" id="nc-daily">0/5</span>
      </a>
      <a class="nav-item" onclick="go('session')" href="#">
        <span class="nav-icon">🎙</span> Storytelling Session
      </a>
      <a class="nav-item" onclick="go('ldr')" href="#">
        <span class="nav-icon">📖</span> Learn → Re-tell
      </a>
      <div class="nav-section-label">Output</div>
      <a class="nav-item" onclick="go('writer')" href="#">
        <span class="nav-icon">✍️</span> Substack Writer
      </a>
      <div class="nav-section-label">Progress</div>
      <a class="nav-item" onclick="go('certs')" href="#">
        <span class="nav-icon">🏆</span> 專業認證
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="streak-title">本週打卡</div>
      <div class="streak-dots" id="streak-row"></div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <span class="bc-home" onclick="go('home')">獨自升級</span>
        <span class="bc-sep">/</span>
        <span class="bc-page" id="bc-page">首頁</span>
      </div>
      <div class="topbar-right">
        <div class="progress-capsule">
          <div class="prog-ring">
            <svg viewBox="0 0 20 20">
              <circle class="prog-track" cx="10" cy="10" r="7"/>
              <circle class="prog-arc" id="prog-arc" cx="10" cy="10" r="7"
                stroke-dasharray="43.98" stroke-dashoffset="43.98"/>
            </svg>
          </div>
          <span class="prog-label" id="prog-label">今日 0%</span>
        </div>
      </div>
    </div>
    <div class="page" id="page-area"></div>
  </div>

  <div class="mobile-nav">
    <div class="mn-item active" onclick="go('home')"><span class="mn-icon">🏠</span><span class="mn-label">首頁</span></div>
    <div class="mn-item" onclick="go('daily')"><span class="mn-icon">✅</span><span class="mn-label">任務</span></div>
    <div class="mn-item" onclick="go('ldr')"><span class="mn-icon">📖</span><span class="mn-label">Re-tell</span></div>
    <div class="mn-item" onclick="go('writer')"><span class="mn-icon">✍️</span><span class="mn-label">Writer</span></div>
    <div class="mn-item" onclick="go('certs')"><span class="mn-icon">🏆</span><span class="mn-label">認證</span></div>
  </div>

</div>

<script src="storage.js"></script>
<script src="api.js"></script>
<script src="home.js"></script>
<script src="daily.js"></script>
<script src="session.js"></script>
<script src="ldr.js"></script>
<script src="writer.js"></script>
<script src="certs.js"></script>
<script src="app.js"></script>
</body>
</html>
